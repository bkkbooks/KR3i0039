body:
  text: 橘録卷上宋韓彥直撰按開寶中陳藏器補神農本草書柑類則有朱柑乳柑黃柑石柑沙柑今永嘉所産實具數品且增多其目但名少異耳凡圃之所植柑比之橘才十之一二大抵柑之植立甚難灌溉鋤治少失時或嵗寒霜雪頻作柑之枝頭殆無生意橘則猶故也得非瓊杯玉斚自昔易闕邪永嘉宰勾君燽有詩聲其詩曰只須霜一顆壓盡橘千奴則黃柑位在陸橘上不待辨而知真柑真柑在品類中最貴可珍其柯木與花實皆異凡木木多婆娑葉則纎長茂密濃隂滿地花時韻特清逺逮結實顆皆圓正膚理如澤蠟始霜之旦園丁採以獻風味照座擘之則香霧噀人北人未之識者一見而知其為真柑矣一名乳柑謂其味之似乳酪溫四邑之柑推泥山為最泥山地不彌一里所産柑其大不七寸圍皮薄而味珍􅎃不黏瓣食不留滓一顆之核才一二間有全無者南塘之柑比年尤盛太守燕賞為秋日盛事前太守參政李公賞柑之詩曰忘機白鳥衝船過堆案黃柑噀手香侍郎曽公之詞曰滿樹葉繁枝重綴青黃千百皆佳句也生枝柑生枝柑似真柑色青而膚粗形不圓味似石榴微酸崔豹古今注曰甘實形如石榴者為壺柑疑此類是鄉人以其耐久留之枝間俟其味變甘帶葉而折堆之盤俎新美可愛故命名生枝海紅柑海紅柑顆極大有及尺以上圍者皮厚而色紅藏之久而味愈甘木髙二三尺有生數十顆者枝重委地亦可愛是柑可以致逺今都下堆積道旁者多此種初因近海故以海紅得名洞庭柑洞庭柑皮細而味美比之他柑韻稍不及熟最早藏之至來嵗之春其色如丹鄉人謂其種自洞庭山來故以得名東坡洞庭春色賦有曰命黃頭之千奴卷震澤而與還翠勺銀罌紫絡青綸物固唯所用醖釀得宜真足以佐騷人之清興耳朱柑朱柑類洞庭而大過之色絶嫣紅味多酸以刀破之漬以鹽始可食園丁云他柑必接唯朱柑不用接而成然鄉人不甚珍寵之賓祭斥不用金柑金柑在他柑特小其大者如錢小者如龍目色似金肌理細瑩圓丹可玩噉者不削去金衣若用以漬蜜尤佳歐陽文忠公歸田録載其香清味美置之樽俎間光彩灼爍如金彈丸誠珍果也都人初不甚貴其後因溫成皇后好食之由是價重京師木柑木柑類洞庭少不慧耳膚理堅頑瓣大而乏膏液外強中乾故得名以木甜柑甜柑類洞庭髙大過之每顆必八瓣不待霜而黃比之他柑加甜柑林未熟之日是柑最先摘置之席間青黃照人長者先嘗之子弟懷以歸為親庭夀焉然是種不多見治圃者植一株二株焉故以少為貴橙子橙子木有刺似朱欒而小永嘉植之不若古栝之盛比年始競有之經霜早黃膚澤可愛狀微有似真柑但圓正細實非真柑北人喜把玩之香氣馥馥可以熏袖可以芼鮮可以漬蜜真嘉實也若真柑則無是二三者人自珍之得非瞭然在人耳目者蓋真柑之細邪橘録卷上
