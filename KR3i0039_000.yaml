body:
  text: 橘録序橘出溫郡最多種柑乃其别種柑自别為八種橘又自别為十四種橙子之屬類橘者又自别為五種合二十有七種而乳柑推第一故溫人謂乳柑為真柑意謂他種皆若假設者而獨真柑為柑耳然橘亦出蘇州台州西出荆州而南出閩廣數十州皆木橘耳已不敢與溫橘齒矧敢與真柑爭髙下耶且溫四邑俱種柑而出泥山者又傑然推第一泥山蓋平陽一孤嶼大都塊土不過覆釜其旁地廣袤只三二里許無連岡隂壑非有佳風氣之所淫漬鬱蒸出三二里外其香味輒益逺益不逮夫物理何可考耶或曰溫並海地斥鹵宜橘與柑而泥山特斥鹵佳處物生其中故獨與他異豫頗不然其説夫姑蘇丹丘與七閩兩廣之地往往多並海斥鹵何獨溫而又豈無三二里得斥鹵佳處如泥山者自屈原司馬遷李衡潘嶽王羲之謝惠連韋應物輩皆嘗言吳楚間出者而未嘗及溫溫最晚出晚出而羣橘盡廢物之變化出沒其浩不可考如此以豫意之溫之學者繇晉唐間未聞有傑然出而與天下敵者至國朝始盛至於今日尤號為文物極盛處豈亦天地光華秀傑不沒之氣來鍾此土其餘英遺液猶被草衣而泥山偶獨得其至美者耶豫北人平生恨不得見橘著花然嘗從橘舟市橘亦未見佳者又安得所謂泥山者啖之去年秋把麾此來得一親見花而再食其實以為幸獨故事太守不得出城從逺遊無因領客入泥山香林中泛酒其下而客乃有遺豫泥山者且曰橘之美當不減荔子荔子今有譜得與牡丹芍藥花譜並行而獨未有譜橘者子愛橘甚橘若有待於子不可以辭豫因為之譜且妄欲自附於歐陽公蔡公之後亦有以表見溫之學者足以夸天下而不獨在夫橘爾淳熙五年十月延安韓彥直序
