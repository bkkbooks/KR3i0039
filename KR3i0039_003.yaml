body:
  text: 橘録卷下宋韓彥直撰種治柑橘宜斥鹵之地四邑皆距江海不十里凡圃之近塗泥者實大而繁味尤珍耐久不損名曰塗柑販而逺適者遇塗柑則爭售方種時髙者畦壟溝以泄水每株相去七八尺嵗四鋤之剃盡草冬月以河泥壅其根夏時更溉以糞壤其葉沃而實繁者斯為園丁之良始栽始取朱欒核洗淨下肥土中一年而長名曰柑淡其根荄蔟蔟然明年移而疏之又一年木大如小兒之拳遇春月乃接取諸柑之佳與橘之美者經年向陽之枝以為貼去地尺餘鎦鋸截之剔其皮兩枝對接勿動搖其根撥掬土實其中以防水蒻護其外麻束之緩急髙下俱得所以候地氣之應接樹之法載之四時纂要中是蓋老圃者能之工之良者揮斤之間氣質隨異無不活者過時而不接則花實復為朱欒人力之有參於造化每如此培植樹髙及二三尺許翦其最下命根以瓦片抵之安於土雜以肥泥實築之始發生命根不斷則根迸于土中枝葉乃不茂盛去病木之病有二蘚與蠧是也樹稍久則枝幹之上苔蘚生焉一不去則蔓衍日滋木之膏液蔭蘚而不及木故枝幹老而枯善圃者用鐵器時刮去之刪其繁枝之不能華實者以通風日以長新枝木間時有蛀屑流出則有蟲蠧之相視其穴以物鈎索之則蟲無所容仍以真杉木作釘窒其處不然則木心受病日以枝葉自凋異時作實瓣間亦有蟲食柑橘每先時而黃者皆其受病於中治之以早乃可澆灌圃中貴雨暘以時旱則堅枯而不長雨則暴長而皮多拆或瓣不實而味淡園丁溝以泄水俾無浸其根方亢陽時抱甕以潤之糞壤以培之則無枯瘁之患採摘嵗當重陽色未黃有採之者名曰摘青舟載之江浙間青柑固人所樂得然採之不待其熟巧於商者間或然爾及經霜二三夕才盡翦遇天氣晴霽數十輩為羣以小翦就枝間平蒂斷之輕置筐筥中護之必甚謹懼其香霧之裂則易壞霧之所漸者亦然尤不便酒香凡採者竟日不敢飲收藏採藏之日先淨掃一室密糊之勿使風入布稻藁其間堆柑橘於地上屏逺酒氣旬日一翻揀之遇微損謂之點柑即揀出否則侵損附近者屢汰去之存而待賈者十之五六人有掘地作坎攀枝條之垂者覆之以土至明年盛夏時開取之色味猶新但傷動枝苗次年不生耳製治朱欒作花比柑橘絶大而香就樹採之用箋香細作片以錫為小甑每入花一重則實香一重使花多於香竅花甑之旁以溜汗液用器盛之炊畢徹甑去花以液浸香明日再蒸凡三換花始暴乾入瓷器密盛之他時焚之如在柑林中柑橘并金柑皆可切瓣勿離之壓去核漬之以蜜金柑著蜜尤勝他品鄉人有用糖􅘮橘者謂之藥橘入篛之灰于鼎間色乃黑可以將逺又橘微損則去皮以肉瓣安竈間用火熏之曰熏柑置之糖蜜中味亦佳入藥橘皮最有益於藥去盡􅎃則為橘紅青橘則為青皮皆藥之所須者大抵橘皮性溫平下氣止藴熱攻痎瘧服久輕身至橘子尤理腰膝近時難得枳實人多植枸橘于籬落間收其實剖乾之以之和藥味與商州之枳幾逼真矣枸橘又未易多得取朱欒之小者半破之日暴以為枳異方醫者不能辨用以治疾亦愈藥貴於愈疾而已孰辨其為真偽耶橘録卷下
