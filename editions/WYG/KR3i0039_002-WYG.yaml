body:
  text: 橘録卷中宋韓彦直撰牛僧孺幽恠録有生於橘者摘剖之有四老人焉其一曰橘中之樂不減商山恨不能深根固蔕耳由是有橘隱名楚屈原作離騷其橘頌一章有曰后皇嘉樹橘采服受命不遷生南國宋謝惠連橘賦亦曰園有嘉樹橘柚煌煌以是知橘實佳物昔人所愛慕若此孔安國曰小曰橘大曰柚郭璞亦云柚似橙而大於橘温無柚而種橙者少非土所宜也本草載橘柚味辛温無毒主去胷中瘕熱利水榖止嘔欬乆服通神輕身長年陶隱居云此言橘皮之功效若此其實之味甘酸食之多痰無益其説為是隱居不敢輕注本草蓋此類也陳藏器補本草謂橘之類有朱橘乳橘塌橘山橘黄淡子今類見之黄橘黄橘狀比之柑差褊小而香霧多於柑嵗雨暘以時則肌充而味甘其圍四寸色方青黄時風味尤勝過是則香氣少減惟遇黄柑則避舎置之海紅生枝柑間未知其孰後先名之曰千奴真屈稱也塌橘塌橘狀大而褊其南枝之向陽者外緑而心甚紅經春味極甘美瓣大而多液其種不常有特橘之次也包橘包橘取其纍纍然若包聚之義是橘外薄内盈隔皮􅎃瓣可數有一枝而生五六顆者懸之極可愛然土膏而樹壯者多有之不稱奇也綿橘綿橘微小極軟美可愛故以名圃中間見一二樹結子復稀物以罕見為竒此橘是也沙橘沙橘取細而甘美之稱或曰種之沙洲之上地虚而宜於橘故其味特珍然邦人稱物之小而甘美者必曰沙如沙𤓰沙蜜沙糖之類特方言耳荔枝橘荔枝橘多出於横陽膚理皺宻類荔子故以取名横陽與閩接軫荔子稱竒于閩黄橘擅美于温故慕而名之有言橘踰淮為枳植物豈能變哉疑似之亂名多此類軟條穿橘軟條穿橘其榦弱而條逺結實頗大皮色光澤滋味有餘其心虛有瓣如蓮子穿其中蓋接橘之始以枝之杪者為之其體性終弱不可以犯霜不可以耐乆又名為女兒橘油橘油橘皮似以油飾之中堅而外黒蓋橘之若柤若柚者擘之而不聞其香食之而不可於口是又橘之僕奴也緑橘緑橘比他柑微小色紺碧可愛不待霜食之味已珍留之枝間色不盡變隆冬採之生意如新横陽人家時有之不常見也乳橘乳橘狀似乳柑且極甘芳得名又名漳橘其種自漳浦來皮堅穰多味絶酸不與常橘齒鄉人以其頗魁梧時置之客間堪與飣座梨相值耳他日有以乳橘為真柑者特碔砆之似玉也金橘金橘生山逕間比金柑更小形色頗類木髙不及尺許結實繁多取者多至數升肉瓣不可分止一核味不可食惟宜植之欄檻中園丁種之以鬻於市亦名山金柑周美成詞有露葉煙梢寒色重攢星低映小珠簾為是橘作自然橘自然橘謂以橘子下種待其長歴十年始作花結實味甚美由其本性自然不雜之人為故其味全蓋他柑與橘必以柑淡子著土俟其婆娑作樹以枝接之為柑為橘為多種俱非天也故是橘以自然名之然十年之計種之以木今之闢圃者多不年嵗間爬其膚以驗其枯榮糞其本以計其乆近誰能遲十年之乆以收效耶是橘名之曰自然當矣接木之詳見於下篇早黄橘早黄橘著花結子比其類獨早秋始半其心已丹千頭方酸而早黄橘之微甘已回齒頰矣王右軍帖有曰奉橘三百枚霜未降未可多得豈是類耶凍橘凍橘其顆如常橘之半嵗八月人目為小春枝頭時作細白花既而橘已黄千林已盡乃始傲然冰雪中著子甚繁春二三月始採之亦可愛前輩詩有曰梅栁攙先桃李晩東風元是一般春此詩不獨詠桃李物理皆然朱欒朱欒顆圓實皮麤瓣堅味酸惡不可食其大有至尺三四寸圍者摘之置几案間乆則其臭如蘭是品雖不足珍然作花絶香鄉人拾其英烝香取其核為種析其皮入藥􅇰有補於時其詳具見下篇香欒香欒大於朱欒形圓色紅芳馨可翫香圓香圓木似朱欒葉尖長枝間有刺植之近水乃生其長如𤓰有及一尺四五寸者清香襲人横陽多有之土人置之明忩淨几間頗可賞翫酒闌并刀破之蓋不減新橙也葉可以藥病藥疑作療枸橘枸橘色青氣烈小者似枳實大者似枳殻能治逆氣心胷痺痛中風便血醫家多用之橘録卷中
